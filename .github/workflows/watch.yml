name: watch

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      backfill_count:
        description: "Run a backfill instead of a normal cycle (number of trades, empty = normal cycle)"
        required: false
        default: ""

concurrency:
  group: watch
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e .

      - name: Run watcher cycle
        if: ${{ github.event.inputs.backfill_count == '' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: politrack cycle

      - name: Run backfill
        if: ${{ github.event.inputs.backfill_count != '' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: politrack backfill --count ${{ github.event.inputs.backfill_count }}

      - name: Commit data and reports
        run: |
          git config user.name "politrack-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/politrack.db data/cache reports
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "watch: $(date -u +'%Y-%m-%d %H:%M') cycle results"
          git pull --rebase origin ${{ github.ref_name }}
          git push
